<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Boss Panel — Asta Mart</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body { background-color: #050508; color: #fff; }
  .admin-header { border-bottom: 1px solid var(--accent-cyan); padding: 20px 0; margin-bottom: 30px; background: rgba(0, 255, 240, 0.02); }
  .admin-title { font-family: var(--font-display); font-size: 32px; font-weight: 900; text-transform: uppercase; color: #fff; }
  .admin-title span { color: var(--accent-cyan); }
  
  .dashboard-grid { display: grid; grid-template-columns: 250px 1fr; gap: 30px; }
  .admin-sidebar { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 20px; height: fit-content; }
  .admin-tab { width: 100%; text-align: left; padding: 12px 15px; background: transparent; border: none; color: var(--white-dim); font-family: var(--font-ui); font-size: 15px; font-weight: bold; cursor: pointer; border-radius: 6px; transition: 0.2s; margin-bottom: 5px; }
  .admin-tab:hover { background: rgba(255,255,255,0.05); color: #fff; }
  .admin-tab.active { background: rgba(63, 233, 255, 0.1); color: var(--accent-cyan); border-left: 3px solid var(--accent-cyan); border-radius: 0 6px 6px 0; }

  .data-table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.4); border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
  .data-table th, .data-table td { padding: 15px; text-align: left; font-family: var(--font-ui); font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .data-table th { background: rgba(255,255,255,0.02); color: var(--white-dim); text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: rgba(255,255,255,0.02); }
  
  .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
  .status-pending { background: rgba(245, 158, 91, 0.2); color: #f59e5b; border: 1px solid #f59e5b; }
  .status-completed { background: rgba(37, 211, 102, 0.2); color: #25d366; border: 1px solid #25d366; }
  .utr-code { font-family: monospace; color: var(--accent-cyan); font-size: 16px; font-weight: bold; background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 4px; }
</style>
</head>
<body>

<div class="admin-header">
  <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
    <div class="admin-title">ASTA <span>ADMIN</span></div>
    <a href="index.html" class="btn-ghost sm">Exit to Site</a>
  </div>
</div>

<div class="container dashboard-grid">
  <!-- SIDEBAR -->
  <aside class="admin-sidebar">
    <button class="admin-tab active" onclick="switchAdminTab('pending')">⏳ Pending Approvals</button>
    <button class="admin-tab" onclick="switchAdminTab('orders')">📦 Edit Orders</button>
    <button class="admin-tab" onclick="switchAdminTab('listings')">🛑 Moderation (Active)</button>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="admin-content">
    
    <!-- PENDING LISTINGS TAB -->
    <div id="tab-pending">
      <h2 style="margin-bottom: 20px; font-family: var(--font-display); text-transform: uppercase;">Pending Approvals</h2>
      <table class="data-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Seller Info</th>
            <th>Price</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="pendingTableBody">
          <tr><td colspan="4" style="text-align: center;">Loading pending listings...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- ORDERS TAB -->
    <div id="tab-orders" class="hidden">
      <h2 style="margin-bottom: 20px; font-family: var(--font-display); text-transform: uppercase;">Inventory Edit Orders</h2>
      <table class="data-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Customer Info</th>
            <th>Account Details</th>
            <th>Payment (UTR)</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="ordersTableBody"></tbody>
      </table>
    </div>

    <!-- LISTINGS TAB -->
    <div id="tab-listings" class="hidden">
      <h2 style="margin-bottom: 20px; font-family: var(--font-display); text-transform: uppercase;">All Active Listings</h2>
      <table class="data-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Seller ID</th>
            <th>Price</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="listingsTableBody"></tbody>
      </table>
    </div>

  </main>
</div>

<script>
const MASTER_PASS = "astaradiant";
if (sessionStorage.getItem('admin_auth') !== "true") {
    const attempt = prompt("SECURE AREA. Enter Admin Passcode:");
    if (attempt === MASTER_PASS) { sessionStorage.setItem('admin_auth', "true"); } 
    else { alert("Access Denied."); window.location.href = "index.html"; }
}

document.addEventListener('DOMContentLoaded', () => {
    loadAllAdminData();
});

function switchAdminTab(tab) {
    document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('main > div').forEach(d => d.classList.add('hidden'));
    event.currentTarget.classList.add('active');
    document.getElementById('tab-' + tab).classList.remove('hidden');
}

async function loadAllAdminData() {
    try {
        const resListings = await fetch('http://localhost:5000/api/listings');
        const allListings = await resListings.json();
        
        const pending = allListings.filter(l => l.status === 'pending');
        const active = allListings.filter(l => l.status === 'active' || l.status === 'sold');

        // Render Pending
        const pendingBody = document.getElementById('pendingTableBody');
        if(pending.length === 0) pendingBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No pending approvals.</td></tr>';
        else pendingBody.innerHTML = pending.map(l => `
            <tr>
                <td><a href="listing.html?id=${l._id}" target="_blank" style="color:var(--accent-cyan); text-decoration:none;"><strong>${l.title}</strong></a><br><span style="font-size:12px; color:var(--white-dim)">${l.skinCount} Skins | ${l.region}</span></td>
                <td>${l.sellerName}<br><span style="font-size:12px; color:var(--white-dim)">${l.sellerId}</span></td>
                <td style="color: var(--red); font-weight: bold;">₹${l.price}</td>
                <td>
                    <button class="btn-primary sm" style="background:var(--accent-green); color:#000; border:none; padding:6px 10px; font-size:11px; margin-right:5px;" onclick="approveListing('${l._id}')">✅ Approve</button>
                    <button class="btn-danger sm" style="padding:6px 10px; font-size:11px;" onclick="banListing('${l._id}')">❌ Reject</button>
                </td>
            </tr>
        `).join('');

        // Render Active
        const listingsBody = document.getElementById('listingsTableBody');
        listingsBody.innerHTML = active.map(l => `
            <tr>
                <td><a href="listing.html?id=${l._id}" target="_blank" style="color: #fff; text-decoration: none;"><strong>${l.title}</strong></a></td>
                <td style="color: var(--white-dim);">${l.sellerId}</td>
                <td style="color: var(--red); font-weight: bold;">₹${l.price}</td>
                <td><span style="color: ${l.status === 'sold' ? 'var(--white-dim)' : 'var(--accent-green)'}">${l.status.toUpperCase()}</span></td>
                <td><button class="btn-danger sm" style="padding: 6px 10px; font-size: 11px;" onclick="banListing('${l._id}')">🗑️ Delete</button></td>
            </tr>
        `).join('');

        // Render Orders
        const resOrders = await fetch('http://localhost:5000/api/admin/orders');
        const orders = await resOrders.json();
        const ordersBody = document.getElementById('ordersTableBody');
        ordersBody.innerHTML = orders.map(o => {
            const date = new Date(o.createdAt).toLocaleDateString();
            return `
            <tr>
                <td style="color: var(--white-dim);">${date}</td>
                <td><strong>${o.sellerName}</strong><br><span style="font-size:12px; color:var(--white-dim)">📱 ${o.sellerPhone || 'N/A'}</span></td>
                <td><div style="font-weight: bold; width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${o.title}</div></td>
                <td><span class="utr-code">${o.transactionId || 'PENDING'}</span><br><span style="font-size:12px; color:var(--red); font-weight:bold;">₹${o.price}</span></td>
                <td><span class="status-badge ${o.status === 'completed' ? 'status-completed' : 'status-pending'}">${o.status}</span></td>
                <td>
                    ${o.status === 'pending' ? `<button class="btn-ghost sm" style="padding: 6px 10px; font-size:11px;" onclick="markOrderCompleted('${o._id}')">✅ Mark Done</button>` : `<span style="color: var(--white-dim); font-size: 12px;">Delivered</span>`}
                </td>
            </tr>
            `;
        }).join('');

    } catch (err) { console.error(err); }
}

async function approveListing(id) {
    if (!confirm("Approve this listing and make it public on the marketplace?")) return;
    try {
        await fetch(`http://localhost:5000/api/admin/listings/${id}/approve`, { method: 'PUT' });
        loadAllAdminData();
    } catch (err) { alert("Error approving listing."); }
}

async function banListing(id) {
    if (!confirm("Delete this listing permanently?")) return;
    try {
        await fetch(`http://localhost:5000/api/listings/${id}`, { method: 'DELETE' });
        loadAllAdminData();
    } catch (err) { alert("Error deleting listing."); }
}

async function markOrderCompleted(id) {
    if (!confirm("Mark this edit as Delivered?")) return;
    try {
        await fetch(`http://localhost:5000/api/admin/orders/${id}/complete`, { method: 'PUT' });
        loadAllAdminData();
    } catch (err) { alert("Error updating order."); }
}
</script>
</body>
</html>
