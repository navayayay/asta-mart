<div id="authModal" class="modal-overlay hidden">
  <div class="modal-box">
    <button class="modal-close" onclick="closeAuth()">✕</button>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div id="loginForm" class="auth-form">
      <h2>Welcome Back</h2>
      <p class="auth-sub">Enter your email address to continue</p>
      <input type="email" placeholder="you@example.com" class="auth-input" id="loginEmail">
      <button class="btn-primary full" onclick="sendOTP('login')">Send Code</button>
      <div id="loginOTPSection" class="otp-section hidden">
        <input type="text" placeholder="Enter 6-digit code" class="auth-input" id="loginOTP" maxlength="6">
        <button class="btn-primary full" onclick="verifyOTP('login')">Verify & Login</button>
      </div>
    </div>
    <div id="signupForm" class="auth-form hidden">
      <h2>Create Account</h2>
      <p class="auth-sub">Join Asta Mart</p>
      <input type="text" placeholder="Full Name" class="auth-input" id="signupName">
      <input type="email" placeholder="you@example.com" class="auth-input" id="signupEmail">
      <button class="btn-primary full" onclick="sendOTP('signup')">Send Code</button>
      <div id="signupOTPSection" class="otp-section hidden">
        <input type="text" placeholder="Enter 6-digit code" class="auth-input" id="signupOTP" maxlength="6">
        <button class="btn-primary full" onclick="verifyOTP('signup')">Verify & Create Account</button>
      </div>
    </div>
  </div>
</div>

<div class="container" style="padding: 100px 20px 40px;" role="main" aria-label="Compare Accounts Section">
  <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
    <h1 class="section-title">Compare Accounts</h1>
    <button class="btn-ghost sm" onclick="clearCompare(); window.location='browse.html'">Clear & Browse</button>
  </div>
  
  <div id="compareTable" class="compare-table-wrapper"></div>
  <div id="compareError" class="no-results hidden" style="text-align: center; padding: 100px 20px;">
    <div class="no-results-icon" style="font-size: 64px; margin-bottom: 20px;">⚠️</div>
    <h3 style="font-family: var(--font-display); font-size: 32px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; color: var(--red);">Failed to Load Accounts</h3>
    <p style="color: var(--white-dim); font-family: var(--font-mono); margin-bottom: 30px;">Could not fetch comparison accounts from the server. Please try again.</p>
    <button class="btn-primary" style="display: inline-block;" onclick="window.location.reload()">Refresh Page</button>
  </div>
</div>

<script src="app.js"></script>
<script src="effects.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      if (typeof GLOBAL_LISTINGS === 'undefined' || GLOBAL_LISTINGS.length === 0) {
        await fetchAllListingsFromDB();
      }
      
      // Check if fetch failed
      if (GLOBAL_LISTINGS.length === 0) {
        document.getElementById('compareError').classList.remove('hidden');
        return;
      }
      
      renderComparePage();
    } catch (e) {
      console.error('Error loading compare page:', e);
      document.getElementById('compareError').classList.remove('hidden');
    }
  });
</script>
<noscript>
  <div style="padding: 40px; text-align: center; background: var(--bg-card); color: var(--white-pure); font-family: 'Barlow', sans-serif;">

    <p>This page requires JavaScript to be enabled to compare accounts and functionality.</p>
    <p>Please enable JavaScript in your browser settings and reload the page.</p>
  </div>
</noscript>
