<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compare Accounts — Asta Mart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="brand-logo-link">
    <img src="asta_mart_logo_transparent.png" alt="Asta Mart" class="nav-brand-img">
  </a>
  
  <div class="nav-links" style="gap: 15px; align-items: center;">
    <a href="browse.html" class="nav-premium-btn"><span class="nav-premium-inner">Browse Accounts</span></a>
    <a href="get-edit.html" class="nav-premium-btn"><span class="nav-premium-inner">Get Inv Edit</span></a>
    <a href="vault-dashboard.html" class="nav-premium-btn"><span class="nav-premium-inner" style="color: var(--accent-cyan);">Asta Vault</span></a>
  </div>
  
  <div class="nav-actions" style="display: flex; align-items: center; gap: 20px;">
    
    <a href="saved.html" class="nav-cart-icon" title="Saved Accounts">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
      </svg>
      <span id="navCartBadge" class="cart-badge" style="display:none;">0</span>
    </a>

    <div id="guestActions" style="display: flex; gap: 15px;">
      <button class="auth-btn-wrapper auth-btn-login" onclick="openAuth('login')">
        <div class="auth-btn-inner">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
          Login
        </div>
      </button>
      <button class="auth-btn-wrapper auth-btn-signup" onclick="openAuth('signup')">
        <div class="auth-btn-inner">
          <svg viewBox="0 0 24 24"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          Sign Up
        </div>
      </button>
    </div>
    
    <div id="userActions" class="hidden">
      <div class="avatar" onclick="toggleUserMenu()"><span id="avatarInitial">U</span>
        
        <div class="user-menu hidden" id="userMenu">
          <div class="menu-row">
            <button class="profile-hub-btn" onclick="window.location.href='profile.html'">
              <div class="sign">
                <svg viewBox="0 0 24 24">
                  <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path>
                </svg>
              </div>
              <div class="text">Profile Hub</div>
            </button>
          </div>
          
          <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0;">
          
          <div class="menu-row">
            <button class="Btn" onclick="logout()" style="margin: 0;">
              <div class="sign">
                <svg viewBox="0 0 512 512">
                  <path d="M377.9 105.9L500.7 228.7c7.2 7.2 11.3 17.1 11.3 27.3s-4.1 20.1-11.3 27.3L377.9 406.1c-6.4 6.4-15 9.9-24 9.9c-18.7 0-33.9-15.2-33.9-33.9l0-62.1-128 0c-17.7 0-32-14.3-32-32l0-64c0-17.7 14.3-32 32-32l128 0 0-62.1c0-18.7 15.2-33.9 33.9-33.9c9 0 17.6 3.6 24 9.9zM160 96L96 96c-17.7 0-32 14.3-32 32l0 256c0 17.7 14.3 32 32 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-64 0c-53 0-96-43-96-96L0 128C0 75 43 32 96 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32z"></path>
                </svg>
              </div>
              <div class="text">Logout</div>
            </button>
          </div>

        </div>
      </div>
    </div>

  </div>
</nav>

<div id="authModal" class="modal-overlay hidden">
  <div class="modal-box">
    <button class="modal-close" onclick="closeAuth()">✕</button>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div id="loginForm" class="auth-form">
      <h2>Welcome Back</h2>
      <p class="auth-sub">Enter your email address to continue</p>
      <input type="email" placeholder="you@example.com" class="auth-input" id="loginEmail">
      <button class="btn-primary full" onclick="sendOTP('login')">Send Code</button>
      <div id="loginOTPSection" class="otp-section hidden">
        <input type="text" placeholder="Enter 6-digit code" class="auth-input" id="loginOTP" maxlength="6">
        <button class="btn-primary full" onclick="verifyOTP('login')">Verify & Login</button>
      </div>
    </div>
    <div id="signupForm" class="auth-form hidden">
      <h2>Create Account</h2>
      <p class="auth-sub">Join Asta Mart</p>
      <input type="text" placeholder="Full Name" class="auth-input" id="signupName">
      <input type="email" placeholder="you@example.com" class="auth-input" id="signupEmail">
      <button class="btn-primary full" onclick="sendOTP('signup')">Send Code</button>
      <div id="signupOTPSection" class="otp-section hidden">
        <input type="text" placeholder="Enter 6-digit code" class="auth-input" id="signupOTP" maxlength="6">
        <button class="btn-primary full" onclick="verifyOTP('signup')">Verify & Create Account</button>
      </div>
    </div>
  </div>
</div>

<div class="container" style="padding: 100px 20px 40px;">
  <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
    <h1 class="section-title">Compare Accounts</h1>
    <button class="btn-ghost sm" onclick="clearCompare(); window.location='browse.html'">Clear & Browse</button>
  </div>
  
  <div id="compareTable" class="compare-table-wrapper"></div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script src="effects.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    if (typeof GLOBAL_LISTINGS === 'undefined' || GLOBAL_LISTINGS.length === 0) {
      await fetchAllListingsFromDB();
    }
    renderComparePage(); 
  });
</script>
</body>
</html>
