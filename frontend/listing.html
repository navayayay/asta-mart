<style>
  /* TABBED INVENTORY UI STYLES */
  .inventory-section { margin-top: 30px; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
  .inventory-tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2); }
  .inv-tab { flex: 1; padding: 15px; background: transparent; border: none; color: var(--white-dim); font-family: var(--font-ui, 'Rajdhani', sans-serif); font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; letter-spacing: 1px; }
  .inv-tab:hover { background: rgba(255,255,255,0.05); color: #fff; }
  .inv-tab.active { background: rgba(0, 255, 240, 0.05); color: var(--accent-cyan); border-bottom: 2px solid var(--accent-cyan); }
  .inv-content { padding: 20px; display: none; }
  .inv-content.active { display: block; animation: fadeIn 0.3s ease; }
  
  /* EXPLORANT SKIN GRID STYLES */
  .skin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
  .skin-card { background: rgba(15, 10, 30, 0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 20px 15px; display: flex; flex-direction: column; align-items: center; text-align: center; transition: transform 0.2s, box-shadow 0.2s; }
  .skin-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
  .skin-card img { height: 60px; object-fit: contain; margin-bottom: 15px; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.4)); }
  .skin-card .skin-icon-placeholder { font-size: 40px; margin-bottom: 15px; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.4)); }
  .skin-card .skin-name { color: #fff; font-size: 14px; font-weight: 600; font-family: 'Barlow', sans-serif; }
  
  /* Dynamic Tier Borders */
  .tier-premium { border-top: 3px solid #d1548d; }   /* Pink */
  .tier-exclusive { border-top: 3px solid #f59e5b; } /* Orange */
  .tier-ultra { border-top: 3px solid #f5d463; }     /* Yellow */
  .tier-battlepass { border-top: 3px solid #8e92a4; } /* Gray for BPs/Agents */
  
  /* 3x2 STAT GRID */
  .detail-stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 30px; }
  .detail-stat { background: rgba(15, 10, 30, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); padding: 18px 10px; text-align: center; border-radius: 6px; }
  .detail-stat-val { font-family: var(--font-display); font-size: 32px; font-weight: 900; color: var(--red); line-height: 1; }
  .detail-stat-label { font-family: var(--font-mono); font-size: 10px; color: var(--white-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 6px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>

        <button class="btn-primary full" onclick="verifyOTP('login')">Verify & Login</button>
      </div>
    </div>
    <div id="signupForm" class="auth-form hidden">
      <h2>Create Account</h2>
      <p class="auth-sub">Join Asta Mart</p>
      <input type="text" placeholder="Full Name" class="auth-input" id="signupName">
      <input type="email" placeholder="you@example.com" class="auth-input" id="signupEmail">
      <button class="btn-primary full" onclick="sendOTP('signup')">Send Code</button>
      <div id="signupOTPSection" class="otp-section hidden">
        <input type="text" placeholder="Enter 6-digit code" class="auth-input" id="signupOTP" maxlength="6">

<script src="data.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    
    // L3: Update canonical URL based on listing id
    if (id) {
      const canonicalLink = document.getElementById('canonicalLink');
      canonicalLink.href = `https://asta-mart.in/listing.html?id=${encodeURIComponent(id)}`;
    }
    
    if (id) {
      if (typeof GLOBAL_LISTINGS === 'undefined' || GLOBAL_LISTINGS.length === 0) {
        await fetchAllListingsFromDB();
      }
      renderListingDetail(id);
    } else {
      document.getElementById('listingDetail').innerHTML = '<div style="grid-column: 1/-1; padding: 100px; text-align: center;"><h2>Invalid Account ID</h2><br><a href="browse.html" class="btn-primary">Browse Accounts</a></div>';
    }
  });
</script>
