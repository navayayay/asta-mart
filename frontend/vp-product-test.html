<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VP Store - Asta Mart</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .vp-store-container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        
        .product-header { display: flex; align-items: center; gap: 20px; margin-top: 20px; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color, #3b3b4a); }
        .product-icon { width: 80px; height: 80px; background: var(--bg-card, #252530); border: 2px solid var(--red); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .product-icon svg { width: 45px; height: 45px; fill: var(--red); }
        .product-title { font-family: var(--font-display); font-size: 2.2rem; color: var(--white); margin: 0 0 5px 0; text-transform: uppercase; }
        .product-subtitle { color: var(--white-dim); margin: 0; font-size: 1.1rem; }

        .step-container { background: var(--bg-card, #252530); border: 1px solid var(--border-color, #3b3b4a); border-radius: 12px; padding: 25px; margin-bottom: 25px; }
        .step-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .step-number { background: var(--red); color: var(--white); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 1.2rem; box-shadow: 0 4px 10px rgba(255, 70, 85, 0.3); }
        .step-title { font-family: var(--font-display); font-size: 1.4rem; color: var(--white); }

        .region-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
        .region-card { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: var(--bg-dark, #16161e); border: 2px solid var(--border-color, #3b3b4a); border-radius: 8px; cursor: pointer; transition: all 0.2s ease; position: relative; text-decoration: none; color: inherit; }
        .region-card:hover { border-color: #5a5a6a; }
        .region-card.selected { border-color: var(--red); background: rgba(255, 70, 85, 0.05); }
        .region-card.selected .region-checkmark { opacity: 1; transform: scale(1); }
        .region-left { display: flex; align-items: center; gap: 12px; }
        .region-flag { font-size: 1.4rem; }
        .region-name { font-family: var(--font-ui); font-size: 1.05rem; font-weight: 600; color: var(--white); }
        .region-checkmark { position: absolute; top: -10px; right: -10px; width: 24px; height: 24px; background: var(--red); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; opacity: 0; transform: scale(0.5); transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 3px solid var(--bg-dark, #16161e); z-index: 2; }
    </style>
</head>
<body class="dark-theme">
    <nav class="navbar">
        <a href="index.html" class="brand-logo-link">
            <img src="asta_mart_logo_transparent.png" alt="Asta Mart" class="nav-brand-img">
        </a>
        
        <div class="nav-links" style="gap: 15px; align-items: center; display: flex !important;">
            <a href="browse.html" class="nav-premium-btn"><span class="nav-premium-inner">Browse Accounts</span></a>
            <a href="get-edit.html" class="nav-premium-btn"><span class="nav-premium-inner">Get Inv Edit</span></a>
            <a href="vault-dashboard.html" class="nav-premium-btn" id="vaultNavBtn"><span class="nav-premium-inner" style="color: var(--accent-cyan);">Asta Vault</span></a>
            <a href="vp-store.html" class="nav-premium-btn">
                <span class="nav-premium-inner" style="color:#730c1e;">
                    🎯 VP Store
                </span>
            </a>
        </div>
        
        <div class="nav-actions" style="display: flex; align-items: center; gap: 20px;">
            <a href="saved.html" class="nav-cart-icon" title="Saved Accounts">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
            </a>
        </div>
    </nav>

    <main class="vp-store-container">
        <div class="product-header">
            <div class="product-icon">
                <svg viewBox="0 0 100 100"><path d="M99.25 48.66V10.28c0-.59-.75-.86-1.12-.39l-41.92 52.4a.627.627 0 00.49 1.02h30.29c.82 0 1.59-.37 2.1-1.01l9.57-11.96c.38-.48.59-1.07.59-1.68zM1.17 50.34L32.66 89.7c.51.64 1.28 1.01 2.1 1.01h30.29c.53 0 .82-.61.49-1.02L1.7 9.89c-.37-.46-1.12-.2-1.12.39v38.38c0 .61.21 1.2.59 1.68z"/></svg>
            </div>
            <div>
                <h1 class="product-title">Valorant Direct Top-Up</h1>
                <p class="product-subtitle">Instant delivery via Riot ID</p>
            </div>
        </div>

        <div class="step-container">
            <div class="step-header">
                <div class="step-number">1</div>
                <div class="step-title">Select Server Region</div>
            </div>
            <div id="region-selector" class="region-grid"></div>
        </div>
    </main>

    <footer>
        <li><a href="vp-store.html">VP Store</a></li>
    </footer>

    <script src="app.js"></script>
    <script>
        let packagesData = [];

        const regionFlags = { 'PH': '🇵🇭', 'ID': '🇮🇩', 'TH': '🇹🇭', 'SG': '🇸🇬', 'KH': '🇰🇭', 'MY': '🇲🇾' };

        async function fetchPackages() {
            try {
                console.log('Fetching from:', `${API_BASE_URL}/vp/packages`);
                const res = await fetch(`${API_BASE_URL}/vp/packages`, { credentials: 'include' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                console.log('Data received:', data);
                packagesData = data.regions;
                renderRegions();
            } catch (err) {
                console.error("Failed to load packages:", err);
                document.getElementById('region-selector').innerHTML = `<p style="color: var(--red); grid-column: 1 / -1;">⚠️ Failed to load regions: ${err.message}</p>`;
            }
        }

        function renderRegions() {
            const container = document.getElementById('region-selector');
            container.innerHTML = packagesData.map(r => `
                <a href="vp-product.html?region=${r.code}" class="region-card" id="region-${r.code}">
                    <div class="region-checkmark">✓</div>
                    <div class="region-left">
                        <div class="region-flag">${regionFlags[r.code] || '🌍'}</div>
                        <div class="region-name">${r.name}</div>
                    </div>
                    <div style="color: #8b8b9e;"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></div>
                </a>
            `).join('');
        }

        fetchPackages();
    </script>
</body>
</html>
