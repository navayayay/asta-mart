<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VP Checkout - Asta Mart</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
    <style>
        /* Override media query to always show nav-links on VP pages */
        .nav-links { display: flex !important; }
        #vaultNavBtn { display: flex !important; }
        
        .vp-checkout-container { max-width: 1000px; margin: 0 auto; padding: 150px 20px 40px 20px; }
        
        .product-header { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color, #3b3b4a); }
        .product-icon { width: 80px; height: 80px; background: var(--bg-card, #252530); border: 2px solid var(--red); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .product-icon svg { width: 45px; height: 45px; fill: var(--red); }
        .product-title { font-family: var(--font-display); font-size: 2.2rem; color: var(--white-pure); margin: 0 0 5px 0; text-transform: uppercase; }
        .product-subtitle { color: var(--white-dim); margin: 0; font-size: 1.1rem; }

        .step-container { background: var(--bg-card, #252530); border: 1px solid var(--border-color, #3b3b4a); border-radius: 12px; padding: 25px; margin-bottom: 25px; }
        .step-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .step-number { background: var(--red); color: var(--white-pure); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 1.2rem; box-shadow: 0 4px 10px rgba(255, 70, 85, 0.3); }
        .step-title { font-family: var(--font-display); font-size: 1.4rem; color: var(--white-pure); }

        .uid-input { width: 100%; max-width: 400px; padding: 15px; background: var(--bg-dark, #16161e); border: 2px solid var(--border-color, #3b3b4a); border-radius: 8px; color: var(--white-pure); font-family: var(--font-ui); font-size: 1.1rem; transition: border-color 0.2s; }
        .uid-input:focus { border-color: var(--red); outline: none; }
        .uid-help { color: var(--white-dim); font-size: 0.9rem; margin-top: 10px; }

        .package-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; perspective: 1000px; }
        
        .card {
            overflow: visible;
            width: 210px;
            height: 280px;
            perspective: 1000px;
        }

        .content {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 300ms;
            box-shadow: 0px 0px 10px 1px #000000ee;
            border-radius: 8px;
            position: relative;
        }

        .front, .back {
            background-color: #151515;
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .front {
            color: white;
            flex-direction: column;
            gap: 15px;
        }

        .back {
            transform: rotateY(180deg);
            width: 100%;
            height: 100%;
            justify-content: center;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .back::before {
            position: absolute;
            content: ' ';
            display: block;
            width: 160px;
            height: 160%;
            background: linear-gradient(90deg, transparent, #ff9966, #ff9966, #ff9966, #ff9966, transparent);
            animation: rotation_481 5000ms infinite linear;
        }

        .back-content {
            position: absolute;
            width: 99%;
            height: 99%;
            background-color: #151515;
            border-radius: 8px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .card:hover .content {
            transform: rotateY(180deg);
        }

        @keyframes rotation_481 {
            0% {
                transform: rotateZ(0deg);
            }
            100% {
                transform: rotateZ(360deg);
            }
        }

        .circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #ffbb66;
            position: relative;
            filter: blur(15px);
            animation: floating 2600ms infinite linear;
        }

        #bottom {
            background-color: #ff8866;
            left: 50px;
            top: 0px;
            width: 150px;
            height: 150px;
            animation-delay: -800ms;
        }

        #right {
            background-color: #ff2233;
            left: 160px;
            top: -80px;
            width: 30px;
            height: 30px;
            animation-delay: -1800ms;
        }

        @keyframes floating {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(10px);
            }
            100% {
                transform: translateY(0px);
            }
        }

        .package-card { position: relative; cursor: pointer; transition: all 0.2s; }
        .package-card:hover { filter: brightness(1.1); }
        .package-card.selected .pkg-checkmark { opacity: 1; transform: scale(1); }
        .pkg-checkmark { position: absolute; top: -10px; right: -10px; width: 24px; height: 24px; background: var(--red); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; opacity: 0; transform: scale(0.5); transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 3px solid var(--bg-dark, #16161e); z-index: 10; }
        .pkg-icon { width: 50px; height: 50px; fill: white; opacity: 0.9; }
        .pkg-vp { font-family: var(--font-display); font-size: 1.8rem; color: white; margin: 0; font-weight: bold; }
        .pkg-price { font-family: var(--font-display); font-size: 2rem; color: var(--red); font-weight: 700; }
        .pkg-price-label { font-size: 0.9rem; color: var(--white-dim); }

        .checkout-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color, #3b3b4a); }
        .checkout-total { font-family: var(--font-display); font-size: 1.8rem; color: var(--white-pure); }
        .btn-buy { background: var(--red); color: var(--white-pure); border: none; padding: 15px 40px; font-family: var(--font-ui); font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: background 0.2s; text-transform: uppercase; }
        .btn-buy:hover:not(:disabled) { background: #e03e4d; }
        .btn-buy:disabled { background: #555; color: #888; cursor: not-allowed; }

        .back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--red); text-decoration: none; margin-bottom: 20px; font-weight: 600; cursor: pointer; transition: gap 0.2s; }
        .back-link:hover { gap: 12px; }
        .back-link svg { width: 18px; height: 18px; }

        #order-status-section { display: none; text-align: center; padding: 40px; background: var(--bg-card); border: 1px solid var(--accent-cyan); border-radius: 12px; margin-bottom: 30px; }
    </style>
</head>
<body class="dark-theme">
    <nav class="navbar">
      <a href="index.html" class="brand-logo-link">
        <img src="asta_mart_logo_transparent.png" alt="Asta Mart" class="nav-brand-img">
      </a>
      
      <div class="nav-links" style="gap: 15px; align-items: center;">
        <a href="browse.html" class="nav-premium-btn"><span class="nav-premium-inner">Browse Accounts</span></a>
        <a href="get-edit.html" class="nav-premium-btn"><span class="nav-premium-inner">Get Inv Edit</span></a>
        <a href="vault-dashboard.html" class="nav-premium-btn" id="vaultNavBtn"><span class="nav-premium-inner" style="color: var(--accent-cyan);">Asta Vault</span></a>
        <a href="vp-store.html" class="nav-premium-btn">
          <span class="nav-premium-inner" style="color:#ff4655;">
            🎯 VP Store
          </span>
        </a>
      </div>
      
      <div class="nav-actions" style="display: flex; align-items: center; gap: 20px;">
        
        <a href="saved.html" class="nav-cart-icon" title="Saved Accounts">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span id="navCartBadge" class="cart-badge" style="display:none;">0</span>
        </a>

        <div id="guestActions" style="display: flex; gap: 15px;">
          <button class="auth-btn-wrapper auth-btn-login" onclick="openAuth('login')">
            <div class="auth-btn-inner">
              <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
              Login
            </div>
          </button>
          <button class="auth-btn-wrapper auth-btn-signup" onclick="openAuth('signup')">
            <div class="auth-btn-inner">
              <svg viewBox="0 0 24 24"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
              Sign Up
            </div>
          </button>
        </div>
        
        <div id="userActions" class="hidden">
          <div class="avatar" onclick="toggleUserMenu()"><span id="avatarInitial">U</span>
            
            <div class="user-menu hidden" id="userMenu">
              <div class="menu-row">
                <button class="profile-hub-btn" onclick="window.location.href='profile.html'">
                  <div class="sign">
                    <svg viewBox="0 0 24 24">
                      <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path>
                    </svg>
                  </div>
                  <div class="text">Profile Hub</div>
                </button>
              </div>
              
              <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0;">
              
              <div class="menu-row">
                <button class="Btn" onclick="logout()" style="margin: 0;">
                  <div class="sign">
                    <svg viewBox="0 0 512 512">
                      <path d="M377.9 105.9L500.7 228.7c7.2 7.2 11.3 17.1 11.3 27.3s-4.1 20.1-11.3 27.3L377.9 406.1c-6.4 6.4-15 9.9-24 9.9c-18.7 0-33.9-15.2-33.9-33.9l0-62.1-128 0c-17.7 0-32-14.3-32-32l0-64c0-17.7 14.3-32 32-32l128 0 0-62.1c0-18.7 15.2-33.9 33.9-33.9c9 0 17.6 3.6 24 9.9zM160 96L96 96c-17.7 0-32 14.3-32 32l0 256c0 17.7 14.3 32 32 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-64 0c-53 0-96-43-96-96L0 128C0 75 43 32 96 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32z"></path>
                    </svg>
                  </div>
                  <div class="text">Logout</div>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <main class="vp-checkout-container">
        <a href="vp-store.html" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back to Regions
        </a>

        <section id="order-status-section">
            <h2 id="order-status-title">⏳ Checking Order Status...</h2>
            <div id="order-status-details"></div>
        </section>

        <div id="checkout-ui">
            <div class="product-header">
                <div class="product-icon">
                    <svg viewBox="0 0 100 100"><path d="M99.25 48.66V10.28c0-.59-.75-.86-1.12-.39l-41.92 52.4a.627.627 0 00.49 1.02h30.29c.82 0 1.59-.37 2.1-1.01l9.57-11.96c.38-.48.59-1.07.59-1.68zM1.17 50.34L32.66 89.7c.51.64 1.28 1.01 2.1 1.01h30.29c.53 0 .82-.61.49-1.02L1.7 9.89c-.37-.46-1.12-.2-1.12.39v38.38c0 .61.21 1.2.59 1.68z"/></svg>
                </div>
                <div>
                    <h1 class="product-title">Complete Your Purchase</h1>
                    <p class="product-subtitle" id="region-display">Loading region...</p>
                </div>
            </div>

            <div class="step-container">
                <div class="step-header">
                    <div class="step-number">2</div>
                    <div class="step-title">Enter Your Riot ID</div>
                </div>
                <input type="text" id="vp-riot-uid" class="uid-input" placeholder="e.g. Username#TAG" oninput="checkPurchaseReady()">
                <p class="uid-help">Find your exact Riot ID in your Valorant profile settings.</p>
            </div>

            <div class="step-container">
                <div class="step-header">
                    <div class="step-number">3</div>
                    <div class="step-title">Select Recharge Amount</div>
                </div>
                <div id="package-grid" class="package-grid">
                    <p style="color: var(--white-dim);">Loading packages...</p>
                </div>

                <div class="checkout-bar">
                    <div class="checkout-total">
                        Total: <span id="display-total" style="color: var(--red);">₹0</span>
                    </div>
                    <button id="btn-buy" class="btn-buy" disabled onclick="handlePurchase()">Buy Now</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <li><a href="vp-store.html">VP Store</a></li>
    </footer>

    <script src="app.js"></script>
    <script>
        let cashfree = null;
        let packagesData = [];
        let selectedRegion = null;
        let selectedPackageId = null;

        if (typeof window.Cashfree !== 'undefined') {
            cashfree = window.Cashfree({ mode: 'sandbox' });
        }

        const vLogo = `<svg class="pkg-icon" viewBox="0 0 100 100"><path d="M99.25 48.66V10.28c0-.59-.75-.86-1.12-.39l-41.92 52.4a.627.627 0 00.49 1.02h30.29c.82 0 1.59-.37 2.1-1.01l9.57-11.96c.38-.48.59-1.07.59-1.68zM1.17 50.34L32.66 89.7c.51.64 1.28 1.01 2.1 1.01h30.29c.53 0 .82-.61.49-1.02L1.7 9.89c-.37-.46-1.12-.2-1.12.39v38.38c0 .61.21 1.2.59 1.68z"/></svg>`;

        const urlParams = new URLSearchParams(window.location.search);
        const regionParam = urlParams.get('region');
        const orderIdParam = urlParams.get('order_id');

        if (orderIdParam) {
            document.getElementById('checkout-ui').style.display = 'none';
            document.getElementById('order-status-section').style.display = 'block';
            pollOrderStatus(orderIdParam, 0);
        } else if (regionParam) {
            fetchPackages(regionParam);
        } else {
            window.location.href = 'vp-store.html';
        }

        async function fetchPackages(region) {
            try {
                console.log('Fetching from:', `${API_BASE_URL}/vp/packages`);
                const res = await fetch(`${API_BASE_URL}/vp/packages`, { credentials: 'include' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                console.log('Data received:', data);
                packagesData = data.regions;
                
                selectedRegion = packagesData.find(r => r.code === region);
                if (!selectedRegion) {
                    document.getElementById('region-display').textContent = 'Region not found';
                    return;
                }
                
                document.getElementById('region-display').textContent = selectedRegion.name;
                renderPackages();
            } catch (err) {
                console.error("Failed to load packages:", err);
                document.getElementById('package-grid').innerHTML = `<p style="color: var(--red); grid-column: 1 / -1;">⚠️ Failed to load packages: ${err.message}</p>`;
            }
        }

        function renderPackages() {
            const container = document.getElementById('package-grid');
            container.innerHTML = selectedRegion.packages.map(pkg => `
                <div class="package-card" id="pkg-${pkg._id}" onclick="selectPackage('${pkg._id}')">
                    <div class="pkg-checkmark">✓</div>
                    <div class="card">
                        <div class="content">
                            <!-- Front: VP Amount -->
                            <div class="front">
                                ${vLogo}
                                <div class="pkg-vp">${pkg.vpAmount}</div>
                                <div style="font-size: 0.9rem; color: #888;">VP</div>
                            </div>
                            <!-- Back: Price -->
                            <div class="back">
                                <div class="back-content">
                                    <div class="pkg-price-label">Price</div>
                                    <div class="pkg-price">₹${pkg.priceINR}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.selectPackage = (pkgId) => {
            selectedPackageId = pkgId;
            document.querySelectorAll('.package-card').forEach(el => el.classList.remove('selected'));
            document.getElementById(`pkg-${pkgId}`).classList.add('selected');
            const pkg = selectedRegion.packages.find(p => p._id === pkgId);
            document.getElementById('display-total').innerText = `₹${pkg.priceINR}`;
            checkPurchaseReady();
        };

        window.checkPurchaseReady = () => {
            const uid = document.getElementById('vp-riot-uid').value.trim();
            const btn = document.getElementById('btn-buy');
            btn.disabled = !(uid.length > 0 && selectedPackageId !== null);
        };

        window.handlePurchase = async () => {
            const uid = document.getElementById('vp-riot-uid').value.trim();
            const token = localStorage.getItem('token') || localStorage.getItem('am_token');

            if (!token) {
                alert('Please log in to purchase VP.');
                return;
            }

            try {
                const csrfResponse = await fetch(`${API_BASE_URL}/csrf-token`, { credentials: 'include' });
                const { csrfToken } = await csrfResponse.json();

                const res = await fetch(`${API_BASE_URL}/vp/create-order`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'CSRF-Token': csrfToken
                    },
                    credentials: 'include',
                    body: JSON.stringify({ packageId: selectedPackageId, riotUID: uid, region: selectedRegion.code })
                });

                const data = await res.json();
                if (data.error) {
                    alert(`Payment error: ${data.error}`);
                    return;
                }

                if (!cashfree) {
                    alert('Cashfree SDK not loaded. Please refresh and try again.');
                    return;
                }

                cashfree.checkout({ paymentSessionId: data.paymentSessionId });
            } catch (err) {
                console.error('Payment error:', err);
                alert(`Failed to initiate payment: ${err.message}`);
            }
        };

        function pollOrderStatus(orderId, attempts) {
            if (attempts > 12) {
                document.getElementById('order-status-title').innerText = "Taking longer than expected. Check My Orders.";
                return;
            }
            const token = localStorage.getItem('token') || localStorage.getItem('am_token');
            fetch(`${API_BASE_URL}/vp/order/${orderId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
                .then(res => res.json())
                .then(data => {
                    const el = document.getElementById('order-status-title');
                    const details = document.getElementById('order-status-details');
                    
                    if (data.paymentStatus === 'pending') {
                        setTimeout(() => pollOrderStatus(orderId, attempts + 1), 5000);
                    } else if (data.paymentStatus === 'paid' && data.fulfillmentStatus !== 'completed') {
                        el.innerText = "✅ Payment received! Fulfilling your VP order...";
                        setTimeout(() => pollOrderStatus(orderId, attempts + 1), 5000);
                    } else if (data.fulfillmentStatus === 'completed') {
                        el.innerText = "🎉 VP Topped Up!";
                        details.innerHTML = `<pre style="text-align:left; background: var(--bg-dark); padding: 15px; border-radius: 8px; overflow: auto;">${JSON.stringify(data.deliveryData, null, 2)}</pre>`;
                    } else {
                        el.innerText = "❌ Fulfillment failed. Contact support.";
                    }
                });
        }
    </script>
</body>
</html>
