<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VP Store - Asta Mart</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Override media query to always show nav-links on VP pages */
        .nav-links { display: flex !important; }
        #vaultNavBtn { display: flex !important; }
        
        .vp-store-container { max-width: 1000px; margin: 0 auto; padding: 150px 20px 40px 20px; }
        
        .product-header { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color, #3b3b4a); }
        .product-icon { width: 80px; height: 80px; background: var(--bg-card, #252530); border: 2px solid var(--red); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .product-icon svg { width: 45px; height: 45px; fill: var(--red); }
        .product-title { font-family: var(--font-display); font-size: 2.2rem; color: var(--white-pure); margin: 0 0 5px 0; text-transform: uppercase; }
        .product-subtitle { color: var(--white-dim); margin: 0; font-size: 1.1rem; }

        .step-container { background: var(--bg-card, #252530); border: 1px solid var(--border-color, #3b3b4a); border-radius: 12px; padding: 25px; margin-bottom: 25px; }
        .step-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .step-number { background: var(--red); color: var(--white-pure); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 1.2rem; box-shadow: 0 4px 10px rgba(255, 70, 85, 0.3); }
        .step-title { font-family: var(--font-display); font-size: 1.4rem; color: var(--white-pure); }

        .region-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 30px; }
        
        /* Gradient Border Card Design */
        .card {
            position: relative;
            width: 100%;
            height: 280px;
            background-color: #3d3c3d;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0;
            gap: 16px;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid #4a4949;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 150%;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            filter: blur(50px);
            top: -50%;
            left: -50%;
            z-index: 0;
            pointer-events: none;
        }
        
        .card::after {
            content: '';
            position: absolute;
            inset: 2px;
            background-color: #323132;
            border-radius: 10px;
            z-index: 1;
            pointer-events: none;
        }
        
        .region-card:hover .card {
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        /* Region Card Link Wrapper */
        .region-card { 
            display: block;
            text-decoration: none; 
            color: inherit;
            position: relative;
        }
        
        .card {
            position: relative;
        }
        
        .region-flag {
            font-size: 3.5rem;
            display: block;
            margin: 0;
        }
        
        .region-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--white-pure);
            margin: 0;
            padding: 0 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .region-subtitle {
            color: var(--white-dim);
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin: 0;
            padding: 0 20px;
        }
        
        .region-provider {
            color: var(--white-pure);
            font-weight: 700;
            margin: 0;
            padding: 0 20px;
        }
        
        .region-checkmark { 
            position: absolute; 
            top: -12px; 
            right: -12px; 
            width: 32px; 
            height: 32px; 
            background: var(--red); 
            color: white; 
            border-radius: 50%; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            font-size: 18px; 
            font-weight: bold; 
            border: 3px solid var(--bg-dark, #16161e); 
            z-index: 10; 
        }
        
        .region-card.selected .region-checkmark { 
            display: flex; 
        }
    </style>
</head>
<body class="dark-theme">
    <nav class="navbar">
      <a href="index.html" class="brand-logo-link">
        <img src="asta_mart_logo_transparent.png" alt="Asta Mart" class="nav-brand-img">
      </a>
      
      <div class="nav-links" style="gap: 15px; align-items: center;">
        <a href="browse.html" class="nav-premium-btn"><span class="nav-premium-inner">Browse Accounts</span></a>
        <a href="get-edit.html" class="nav-premium-btn"><span class="nav-premium-inner">Get Inv Edit</span></a>
        <a href="vault-dashboard.html" class="nav-premium-btn" id="vaultNavBtn"><span class="nav-premium-inner" style="color: var(--accent-cyan);">Asta Vault</span></a>
        <a href="vp-store.html" class="nav-premium-btn">
          <span class="nav-premium-inner" style="color:#ff4655;">
            🎯 VP Store
          </span>
        </a>
      </div>
      
      <div class="nav-actions" style="display: flex; align-items: center; gap: 20px;">
        
        <a href="saved.html" class="nav-cart-icon" title="Saved Accounts">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span id="navCartBadge" class="cart-badge" style="display:none;">0</span>
        </a>

        <div id="guestActions" style="display: flex; gap: 15px;">
          <button class="auth-btn-wrapper auth-btn-login" onclick="openAuth('login')">
            <div class="auth-btn-inner">

              Login
            </div>
          </button>
          <button class="auth-btn-wrapper auth-btn-signup" onclick="openAuth('signup')">
            <div class="auth-btn-inner">
              <svg viewBox="0 0 24 24"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
              Sign Up
            </div>
          </button>
        </div>
        
        <div id="userActions" class="hidden">
          <div class="avatar" onclick="toggleUserMenu()"><span id="avatarInitial">U</span>
            
            <div class="user-menu hidden" id="userMenu">
              <div class="menu-row">
                <button class="profile-hub-btn" onclick="window.location.href='profile.html'">
                  <div class="sign">
                    <svg viewBox="0 0 24 24">
                      <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path>
                    </svg>
                  </div>
                  <div class="text">Profile Hub</div>
                </button>
              </div>
              
              <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0;">
              
              <div class="menu-row">
                <button class="Btn" onclick="logout()" style="margin: 0;">
                  <div class="sign">
                    <svg viewBox="0 0 512 512">
                      <path d="M377.9 105.9L500.7 228.7c7.2 7.2 11.3 17.1 11.3 27.3s-4.1 20.1-11.3 27.3L377.9 406.1c-6.4 6.4-15 9.9-24 9.9c-18.7 0-33.9-15.2-33.9-33.9l0-62.1-128 0c-17.7 0-32-14.3-32-32l0-64c0-17.7 14.3-32 32-32l128 0 0-62.1c0-18.7 15.2-33.9 33.9-33.9c9 0 17.6 3.6 24 9.9zM160 96L96 96c-17.7 0-32 14.3-32 32l0 256c0 17.7 14.3 32 32 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-64 0c-53 0-96-43-96-96L0 128C0 75 43 32 96 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32z"></path>
                    </svg>
                  </div>
                  <div class="text">Logout</div>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <main class="vp-store-container">
        <div class="product-header">
            <div class="product-icon">
                <svg viewBox="0 0 100 100"><path d="M99.25 48.66V10.28c0-.59-.75-.86-1.12-.39l-41.92 52.4a.627.627 0 00.49 1.02h30.29c.82 0 1.59-.37 2.1-1.01l9.57-11.96c.38-.48.59-1.07.59-1.68zM1.17 50.34L32.66 89.7c.51.64 1.28 1.01 2.1 1.01h30.29c.53 0 .82-.61.49-1.02L1.7 9.89c-.37-.46-1.12-.2-1.12.39v38.38c0 .61.21 1.2.59 1.68z"/></svg>
            </div>
            <div>
                <h1 class="product-title">Valorant Direct Top-Up</h1>
                <p class="product-subtitle">Instant delivery via Riot ID</p>
            </div>
        </div>

        <div class="step-container">
            <div class="step-header">
                <div class="step-number">1</div>
                <div class="step-title">Select Server Region</div>
            </div>
            <div id="region-selector" class="region-grid"></div>
        </div>
    </main>

    <footer>
        <li><a href="vp-store.html">VP Store</a></li>
    </footer>

    <script src="app.js"></script>
    <script>
        let packagesData = [];

        const regionFlags = { 'PH': '🇵🇭', 'ID': '🇮🇩', 'TH': '🇹🇭', 'SG': '🇸🇬', 'KH': '🇰🇭', 'MY': '🇲🇾' };

        async function fetchPackages() {
            try {
                console.log('Fetching from:', `${API_BASE_URL}/vp/packages`);
                const res = await fetch(`${API_BASE_URL}/vp/packages`, { credentials: 'include' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                console.log('Data received:', data);
                packagesData = data.regions;
                renderRegions();
            } catch (err) {
                console.error("Failed to load packages:", err);
                document.getElementById('region-selector').innerHTML = `<p style="color: var(--red); grid-column: 1 / -1;">⚠️ Failed to load regions: ${err.message}</p>`;
            }
        }

        function renderRegions() {
            const container = document.getElementById('region-selector');
            container.innerHTML = packagesData.map(r => `
                <a href="vp-product.html?region=${r.code}" class="region-card" id="region-${r.code}">
                    <div class="card">
                        <div style="position: relative; z-index: 2; display: inherit; flex-direction: inherit; align-items: inherit; justify-content: inherit; gap: inherit; width: 100%;">
                            <div class="region-checkmark">✓</div>
                            <div class="region-flag">${regionFlags[r.code] || '🌍'}</div>
                            <p class="region-title">${r.name}</p>
                            <p class="region-subtitle">Provided By</p>
                            <p class="region-provider">Asta Mart</p>
                        </div>
                    </div>
                </a>
            `).join('');
        }

        fetchPackages();
    </script>
</body>
</html>
